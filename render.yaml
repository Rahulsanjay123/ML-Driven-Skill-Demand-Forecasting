services:
  - type: web
    name: skill-forecasting-api
    runtime: node
    buildCommand: "npm install && cd backend && npm install && pip install -r ml-service/requirements.txt"
    startCommand: "npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
